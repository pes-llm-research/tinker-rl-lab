# Reviewer Response Registry
# Each weakness addressed in paper by inserting the exact marker string
# as a LaTeX comment anywhere in paper/**/*.tex or paper/sections/**/*.tex.
# Scorer greps for markers; count = weaknesses_addressed.
# Format: %REVIEW-ADDR: <id> -- <one-line justification>
#
# Markers go near the text/table/figure that resolves the concern.
# Removing a marker = un-addressing. Duplicate markers = 1 point (dedup by id).

schema_version: 1
source: NeurIPS 2026 reviewer feedback (received 2026-04-19)

weaknesses:
  # --- Technical limitations ---
  - id: W1-zvf-tautology
    category: technical
    summary: ZVF risks tautological correlation with reward; no partial-correlation ablation vs entropy/KL/advantage-variance
    rebuttal_targets: [paper/sections/zvf.tex, paper/sections/experiments.tex]
    marker: "%REVIEW-ADDR: W1-zvf-tautology"
    severity: critical

  - id: W2-groupsize-contradiction
