name: TinkerRL CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Lint with ruff
        run: ruff check .
      - name: Check formatting
        run: ruff format --check .

  test-core:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -v --tb=short
      - name: Test seed utility
        run: python -c "from utils.seed import set_global_seed; info = set_global_seed(42); print('Seed set successfully:', info)"
      - name: Test imports
        run: |
          python -c "from utils.seed import set_global_seed, get_seed_from_args"
          python -c "from utils.stats import bootstrap_ci, compute_iqm"

  test-environments:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy torch gymnasium
          # sb3_ppo_math.py imports stable_baselines3 at module scope,
          # so it must be available even for the env-only smoke test.
          pip install "stable-baselines3>=2.1.0"
          pip install -e "."
      - name: Test ArithmeticEnv (SB3 version)
        run: |
          python -c "
          import sys, os
          sys.path.insert(0, '.')
          # Execute the module's top section (up to the first def main)
          # providing a real __file__ so the module's own sys.path.insert
          # logic works when pulled in via exec().
          src_path = os.path.abspath('experiments/implementations/sb3_ppo_math.py')
          src = open(src_path).read().split('def main')[0]
          ns = {'__file__': src_path, '__name__': '__main__'}
          exec(compile(src, src_path, 'exec'), ns)
          ArithmeticEnv = ns['ArithmeticEnv']
          env = ArithmeticEnv(max_num=99)
          obs, _ = env.reset(seed=42)
          assert obs.shape == (2,), f'Expected shape (2,), got {obs.shape}'
          action = int(obs[0] + obs[1])
          _, reward, done, _, info = env.step(action)
          print(f'Env test passed: obs={obs}, reward={reward}, correct={info[\"correct\"]}')
          "

  reproducibility-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy torch gymnasium
      - name: Verify seed determinism
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from utils.seed import set_global_seed
          import numpy as np
          import torch
          
          # Run 1
          set_global_seed(42)
          r1_np = np.random.random(10).tolist()
          r1_torch = torch.randn(10).tolist()
          
          # Run 2 (same seed)
          set_global_seed(42)
          r2_np = np.random.random(10).tolist()
          r2_torch = torch.randn(10).tolist()
          
          assert r1_np == r2_np, 'NumPy seed not deterministic!'
          assert r1_torch == r2_torch, 'PyTorch seed not deterministic!'
          print('Reproducibility check PASSED')
          "

  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required documentation
        run: |
          for f in README.md LICENSE REPRODUCE.md BASELINES.md CONTRIBUTING.md ARTIFACT.md; do
            if [ ! -f "$f" ]; then
              echo "ERROR: Missing required file: $f"
              exit 1
            fi
          done
          echo "All required documentation files present"
      - name: Check experiment implementations exist
        run: |
          count=$(ls experiments/implementations/*.py 2>/dev/null | wc -l)
          if [ "$count" -lt 5 ]; then
            echo "ERROR: Expected at least 5 experiment implementations, found $count"
            exit 1
          fi
          echo "Found $count experiment implementations"
